name: pr-governance-scan

# ============================================================================
# BYPASS / BACKSTOP path — GitHub PR governance scan (Aiden-only).
#
# CORE PRINCIPLE: this stage gate ONLY TALKS TO AIDEN. It does NOT run
# terraform, trivy, conftest, or assume any AWS role. When a PR is opened
# directly against `main` (bypassing the sanctioned pre-PR
# `mcp-tf-governance.submit_tf_pr` gate), this workflow simply POSTs the PR
# context to the Aiden 2.0 "Github PR governance scan" webhook. Aiden then runs
# `mcp-tf-governance.validate_tf_governance`, which clones the branch and runs
# `terraform plan` -> trivy + conftest UNDER THE HOOD, and reports PASS / FAIL /
# plan-failure back onto the PR.
#
# Trivy/terraform/OIDC are intentionally INVISIBLE here — they are tools Aiden
# consumes internally via mcp-tf-governance. This is the GitHub-PR analog of the
# GitLab `notify_aiden_mr_governance` report-only job. Nothing here ever runs
# `terraform apply`.
# ============================================================================
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "scenarios/**"
      - "environments/**"
      - "modules/**"
  workflow_dispatch:

# Only need to read the repo to compute the changed-file list. No id-token:
# there is no OIDC / assume-role on this path (that is what fixes the previous
# "Could not assume role with OIDC" error — the gate no longer assumes a role).
permissions:
  contents: read

jobs:
  notify-aiden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed files
        id: diff
        run: |
          set +e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && git cat-file -e "$BASE_SHA" 2>/dev/null; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | head -100 \
              | jq -R -s -c 'split("\n")|map(select(length>0))' > changed-files.json
          else
            echo '[]' > changed-files.json
          fi
          echo "changed files:"; cat changed-files.json

      - name: Notify Aiden PR governance webhook
        env:
          AIDEN_PR_GOVERNANCE_WEBHOOK_URL: ${{ secrets.AIDEN_PR_GOVERNANCE_WEBHOOK_URL }}
          # Optional: set this repo secret to a run-status endpoint to enable the
          # best-effort verdict poll below. Unset = report-only (still notifies).
          AIDEN_RUN_STATUS_URL: ${{ secrets.AIDEN_RUN_STATUS_URL }}
        run: |
          set +e
          if [ -z "${AIDEN_PR_GOVERNANCE_WEBHOOK_URL:-}" ]; then
            echo "WARN: AIDEN_PR_GOVERNANCE_WEBHOOK_URL secret unset — skipping Aiden notify"
            exit 0
          fi

          CHANGED=$(cat changed-files.json 2>/dev/null || echo '[]')
          echo "$CHANGED" | jq -e . >/dev/null 2>&1 || CHANGED='[]'

          # Report-only payload. CI does NOT compute a verdict or findings —
          # Aiden (mcp-tf-governance.validate_tf_governance) does that under the
          # hood (clone branch -> terraform plan -> trivy + conftest).
          PAYLOAD=$(jq -n \
            --arg project        "${{ github.repository }}" \
            --arg pr_number      "${{ github.event.pull_request.number }}" \
            --arg pr_url         "${{ github.event.pull_request.html_url }}" \
            --arg source_branch  "${{ github.event.pull_request.head.ref }}" \
            --arg target_branch  "${{ github.event.pull_request.base.ref }}" \
            --arg run_url        "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson changed    "$CHANGED" \
            '{
              source: "github-actions",
              event: "pr_governance_scan",
              kind: "terraform",
              project: $project,
              pr_number: $pr_number,
              pr_url: $pr_url,
              source_branch: $source_branch,
              target_branch: $target_branch,
              run_url: $run_url,
              changed_files: $changed,
              instruction: "Terraform PR bypass — clone branch, run terraform plan then Trivy+Rego via mcp-tf-governance.validate_tf_governance, report PASS/FAIL or plan-failure, never apply."
            }')

          echo "Posting pr_governance_scan to Aiden webhook (report-only)..."
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST "$AIDEN_PR_GOVERNANCE_WEBHOOK_URL" \
            -H "Content-Type: application/json" -d "$PAYLOAD")
          echo "HTTP $HTTP"
          cat /tmp/resp.json 2>/dev/null | head -c 800; echo
          RUN_ID=$(jq -r '.run_id // empty' /tmp/resp.json 2>/dev/null)
          echo "aiden_run_id=$RUN_ID"
          {
            echo "### Aiden PR governance scan";
            echo "- webhook HTTP: \`$HTTP\`";
            echo "- Aiden run_id: \`${RUN_ID:-n/a}\`";
            echo "- Aiden runs mcp-tf-governance.validate_tf_governance on \`${{ github.event.pull_request.head.ref }}\` (plan + Trivy + Rego under the hood) and reports the verdict on this PR.";
          } >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

          case "$HTTP" in
            2*) echo "OK: notified Aiden (HTTP $HTTP, run_id=${RUN_ID:-n/a})";;
            *)  echo "WARN: Aiden webhook HTTP $HTTP (report-only backstop — not failing the build)"; exit 0;;
          esac

          # -------- BEST-EFFORT verdict poll (optional, never fails build) -----
          # Only runs if AIDEN_RUN_STATUS_URL is configured AND we got a run_id.
          # The trigger endpoint is fire-and-forget (returns 202 + run_id), so
          # by default this is report-only — Aiden posts the verdict on the PR.
          if [ -n "${AIDEN_RUN_STATUS_URL:-}" ] && [ -n "${RUN_ID:-}" ]; then
            echo "Polling Aiden run $RUN_ID for a verdict (best-effort, 120s cap)..."
            for i in $(seq 1 24); do
              PHTTP=$(curl -sS -m 10 -o /tmp/run.json -w '%{http_code}' \
                "${AIDEN_RUN_STATUS_URL%/}/${RUN_ID}" 2>/dev/null)
              STATUS=$(jq -r '.status // .state // empty' /tmp/run.json 2>/dev/null)
              VERDICT=$(jq -r '.verdict // .result // empty' /tmp/run.json 2>/dev/null)
              echo "  poll #$i: http=$PHTTP status=${STATUS:-?} verdict=${VERDICT:-?}"
              case "$STATUS" in
                completed|succeeded|finished|failed|error) echo "Aiden verdict: ${VERDICT:-see PR}"; break;;
              esac
              sleep 5
            done
          else
            echo "Report-only: no AIDEN_RUN_STATUS_URL configured — Aiden will post the verdict on the PR."
          fi
          exit 0
