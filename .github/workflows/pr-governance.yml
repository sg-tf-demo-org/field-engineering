name: pr-governance-scan

# ============================================================================
# Human-first PR loop: every PR head SHA is scanned.
#
#   1. pending commit status aiden/governance
#   2. webhook → Aiden watch session (reporter)
#   3. mcp-tf-governance.validate_tf_governance directly (brain / plan+policies)
#   4. commit status success|failure|error + Details → session:{id} watch URL
#
# Job fails on non-PASS so this can be a required check. CI never runs
# terraform/Trivy itself — plan happens inside the governance MCP.
# ============================================================================
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "scenarios/**"
      - "environments/**"
      - "modules/**"
      - "scripts/pr_aiden_gate.py"
      - "scripts/aiden_gate.py"
      - "scripts/resolve_aiden_watch.py"
      - ".github/workflows/pr-governance.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  pull-requests: write
  issues: write

jobs:
  aiden-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute changed files
        run: |
          set +e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && git cat-file -e "$BASE_SHA" 2>/dev/null; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | head -100 \
              | jq -R -s -c 'split("\n")|map(select(length>0))' > changed-files.json
          else
            echo '[]' > changed-files.json
          fi

      - name: Aiden PR governance (MCP verdict + watch link)
        env:
          GATE_PROJECT: ${{ github.repository }}
          GATE_REPO: ${{ github.repository }}
          GATE_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          GATE_BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
          GATE_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GATE_PR_NUMBER: ${{ github.event.pull_request.number }}
          GATE_PR_URL: ${{ github.event.pull_request.html_url }}
          GATE_SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          GATE_TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          GATE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GATE_CHANGED_FILES: ${{ '' }}
          AIDEN_PR_GOVERNANCE_WEBHOOK_URL: ${{ secrets.AIDEN_PR_GOVERNANCE_WEBHOOK_URL }}
          AIDEN_TF_GOV_MCP_URL: ${{ secrets.AIDEN_TF_GOV_MCP_URL }}
          AIDEN_TF_GOV_MCP_TOKEN: ${{ secrets.AIDEN_TF_GOV_MCP_TOKEN }}
          AIDEN_GUILD_TOKEN: ${{ secrets.AIDEN_GUILD_TOKEN }}
          AIDEN_ORG_ID: ${{ secrets.AIDEN_ORG_ID }}
          AIDEN_GUILD_BASE: https://stage.dev.stackgen.com
          AIDEN_WATCH_RESOLVE_TIMEOUT: "90"
          GH_TOKEN: ${{ github.token }}
          GATE_MCP_TIMEOUT: "600"
        run: |
          set -euo pipefail
          export GATE_CHANGED_FILES="$(cat changed-files.json 2>/dev/null || echo '[]')"
          python3 scripts/pr_aiden_gate.py
