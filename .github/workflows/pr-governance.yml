name: pr-governance-scan

# ============================================================================
# BYPASS / BACKSTOP path — GitHub PR governance scan (Aiden-only).
#
# CORE PRINCIPLE: this stage gate ONLY TALKS TO AIDEN. It does NOT run
# terraform / governance scanners or assume any AWS role. When a PR is opened
# directly against `main` (bypassing the sanctioned pre-PR
# `mcp-tf-governance.submit_tf_pr` gate), this workflow POSTs the PR context to
# the Aiden 2.0 "Github PR governance scan" webhook. Aiden runs
# `mcp-tf-governance.validate_tf_governance` and reports PASS / FAIL /
# plan-failure. The job summary links the Aiden execution watch URL so a human
# can review (and approve) from what they see in Aiden.
#
# Nothing here ever runs `terraform apply`.
# ============================================================================
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "scenarios/**"
      - "environments/**"
      - "modules/**"
  workflow_dispatch:

# Only need to read the repo to compute the changed-file list. No id-token:
# there is no OIDC / assume-role on this path.
permissions:
  contents: read

jobs:
  notify-aiden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed files
        id: diff
        run: |
          set +e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && git cat-file -e "$BASE_SHA" 2>/dev/null; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | head -100 \
              | jq -R -s -c 'split("\n")|map(select(length>0))' > changed-files.json
          else
            echo '[]' > changed-files.json
          fi
          echo "changed files:"; cat changed-files.json

      - name: Notify Aiden PR governance webhook
        env:
          AIDEN_PR_GOVERNANCE_WEBHOOK_URL: ${{ secrets.AIDEN_PR_GOVERNANCE_WEBHOOK_URL }}
          AIDEN_WATCH_BASE: https://stage.dev.stackgen.com/app/settings/workspace/devops-copilot/executions
        run: |
          set +e
          if [ -z "${AIDEN_PR_GOVERNANCE_WEBHOOK_URL:-}" ]; then
            echo "WARN: AIDEN_PR_GOVERNANCE_WEBHOOK_URL secret unset — skipping Aiden notify"
            exit 0
          fi

          CHANGED=$(cat changed-files.json 2>/dev/null || echo '[]')
          echo "$CHANGED" | jq -e . >/dev/null 2>&1 || CHANGED='[]'

          # Report-only payload. CI does NOT compute a verdict — Aiden does via
          # mcp-tf-governance.validate_tf_governance.
          PAYLOAD=$(jq -n \
            --arg project        "${{ github.repository }}" \
            --arg pr_number      "${{ github.event.pull_request.number }}" \
            --arg pr_url         "${{ github.event.pull_request.html_url }}" \
            --arg source_branch  "${{ github.event.pull_request.head.ref }}" \
            --arg target_branch  "${{ github.event.pull_request.base.ref }}" \
            --arg run_url        "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson changed    "$CHANGED" \
            '{
              source: "github-actions",
              event: "pr_governance_scan",
              kind: "terraform",
              project: $project,
              pr_number: $pr_number,
              pr_url: $pr_url,
              source_branch: $source_branch,
              target_branch: $target_branch,
              run_url: $run_url,
              changed_files: $changed,
              instruction: "Terraform PR bypass — clone branch, run mcp-tf-governance.validate_tf_governance, report PASS/FAIL or plan-failure, never apply."
            }')

          echo "Posting pr_governance_scan to Aiden webhook (report-only)..."
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST "$AIDEN_PR_GOVERNANCE_WEBHOOK_URL" \
            -H "Content-Type: application/json" -d "$PAYLOAD")
          echo "HTTP $HTTP"
          cat /tmp/resp.json 2>/dev/null | head -c 800; echo
          RUN_ID=$(jq -r '.run_id // empty' /tmp/resp.json 2>/dev/null)
          WATCH_URL=""
          if [ -n "${RUN_ID:-}" ]; then
            RID_NODASH=$(echo "$RUN_ID" | tr -d '-')
            WATCH_URL="${AIDEN_WATCH_BASE}/${RID_NODASH}/watch"
          fi

          {
            echo "### Aiden PR governance scan"
            echo ""
            echo "Review the governance result in Aiden and approve / reject from there:"
            if [ -n "$WATCH_URL" ]; then
              echo ""
              echo "**[Open Aiden governance execution](${WATCH_URL})**"
              echo ""
              echo "- Branch: \`${{ github.event.pull_request.head.ref }}\`"
              echo "- Watch URL: ${WATCH_URL}"
            else
              echo ""
              echo "- Branch: \`${{ github.event.pull_request.head.ref }}\`"
              echo "- Aiden execution: not returned (webhook HTTP \`${HTTP}\`)"
            fi
            echo "- Webhook HTTP: \`${HTTP}\`"
          } >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

          if [ -n "$WATCH_URL" ]; then
            echo "OK: notified Aiden (HTTP $HTTP)"
            echo "Watch: $WATCH_URL"
          else
            echo "WARN: Aiden webhook HTTP $HTTP (no run_id / watch URL)"
          fi
          exit 0
