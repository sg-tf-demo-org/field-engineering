name: deploy

# ============================================================================
# Model A — Aiden-gated progressive deploy (GitHub-orchestrated).
#
# Per environment there are THREE visible stages, run strictly in order:
#
#   Governance - <env>   Aiden governance gate (plan + Trivy + Rego UNDER THE
#                        HOOD via mcp-tf-governance). Fail-closed. No apply.
#   Approve - <env>      Native GitHub Environment required-reviewer gate. A
#                        human must approve before it (and thus deploy) proceeds.
#   Deploy - <env>       Self-hosted runner assumes the per-env AWS role via OIDC
#                        and runs `terraform apply`. Apply happens ONLY here.
#
# The whole chain is sequential: dev fully promotes before stage, stage before
# prod. If a Governance gate fails, its Approve/Deploy never run, and no later
# environment is touched. Apply never happens on the PR / gate path.
# ============================================================================
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/**"

# No workflow-level id-token: only the Deploy jobs need OIDC (declared per job).
permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "697091778198"

jobs:
  # ============================ DEV ============================
  governance-dev:
    name: Governance - dev
    uses: ./.github/workflows/governance.yml
    secrets: inherit
    with:
      environment: dev
      tf_dir: environments/dev

  approve-dev:
    name: Approve - dev
    needs: governance-dev
    runs-on: ubuntu-latest
    environment: dev            # required reviewers on this env pause here for a human
    steps:
      - run: echo "dev governance PASSED and approved by a human — proceeding to Deploy - dev."

  deploy-dev:
    name: Deploy - dev
    needs: approve-dev
    runs-on: [self-hosted]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::697091778198:role/dev-fe-infra-otel-demo-deploy
          aws-region: us-east-1
      - name: Terraform apply (dev)
        working-directory: environments/dev
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

  # ============================ STAGE ============================
  governance-stage:
    name: Governance - stage
    needs: deploy-dev
    uses: ./.github/workflows/governance.yml
    secrets: inherit
    with:
      environment: stage
      tf_dir: environments/stage

  approve-stage:
    name: Approve - stage
    needs: governance-stage
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - run: echo "stage governance PASSED and approved by a human — proceeding to Deploy - stage."

  deploy-stage:
    name: Deploy - stage
    needs: approve-stage
    runs-on: [self-hosted]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::697091778198:role/stage-fe-infra-otel-demo-deploy
          aws-region: us-east-1
      - name: Terraform apply (stage)
        working-directory: environments/stage
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

  # ============================ PROD ============================
  governance-prod:
    name: Governance - prod
    needs: deploy-stage
    uses: ./.github/workflows/governance.yml
    secrets: inherit
    with:
      environment: prod
      tf_dir: environments/prod

  approve-prod:
    name: Approve - prod
    needs: governance-prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - run: echo "prod governance PASSED and approved by a human — proceeding to Deploy - prod."

  deploy-prod:
    name: Deploy - prod
    needs: approve-prod
    runs-on: [self-hosted]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::697091778198:role/prod-fe-infra-otel-demo-deploy
          aws-region: us-east-1
      - name: Terraform apply (prod)
        working-directory: environments/prod
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve
