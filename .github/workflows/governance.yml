name: governance-gate

# ============================================================================
# Aiden-driven governance gate (Model A). This reusable workflow ONLY TALKS TO
# AIDEN. It does NOT run terraform, trivy, conftest, or assume any AWS role, and
# it never applies anything.
#
# For the given environment it calls scripts/aiden_gate.py, which:
#   1. (reporter) fires the Aiden "deploy governance gate" webhook so an Aiden
#      agent execution is created and prints the deep "watch" URL, then
#   2. (verdict) calls Aiden's governance MCP tool
#      mcp-tf-governance.validate_tf_governance(project, ref, tf_dir=<env dir>)
#      directly. That tool runs `terraform plan -> Trivy + Rego` UNDER THE HOOD
#      in-cluster and returns a deterministic PASS / FAIL / ERROR verdict.
#
# Trivy/terraform/OIDC are intentionally INVISIBLE here — they are tools Aiden
# consumes internally. Fail-closed: any non-PASS (or timeout / transport error)
# fails the job, so the downstream Approve/Deploy stages never run.
# ============================================================================
on:
  workflow_call:
    inputs:
      environment:
        description: Environment name (dev/stage/prod) — for labelling only
        required: true
        type: string
      tf_dir:
        description: Terraform env dir to govern (e.g. environments/dev)
        required: true
        type: string
      ref:
        description: Branch to govern (Aiden clones this ref). Deploy gate runs on main.
        required: false
        type: string
        default: main

# No id-token: the gate NEVER assumes an AWS role. Read-only checkout for the script.
permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Aiden governance gate (${{ inputs.environment }})
        env:
          GATE_PROJECT: ${{ github.repository }}
          GATE_REF: ${{ inputs.ref }}
          GATE_TF_DIR: ${{ inputs.tf_dir }}
          GATE_ENVIRONMENT: ${{ inputs.environment }}
          GATE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AIDEN_TF_GOV_MCP_URL: ${{ secrets.AIDEN_TF_GOV_MCP_URL }}
          AIDEN_TF_GOV_MCP_TOKEN: ${{ secrets.AIDEN_TF_GOV_MCP_TOKEN }}
          AIDEN_DEPLOY_GATE_WEBHOOK_URL: ${{ secrets.AIDEN_DEPLOY_GATE_WEBHOOK_URL }}
        run: python3 scripts/aiden_gate.py
